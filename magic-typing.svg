<svg viewBox="0 0 660 140" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <path id="star" d="M0,-6 L1.8,-1.8 L6,0 L1.8,1.8 L0,6 L-1.8,1.8 L-6,0 L-1.8,-1.8 Z" fill="url(#wandGrad)"/>

    <clipPath id="clip0">
      <rect x="0" y="50" width="0" height="55">
        <animate attributeName="width" dur="18s" begin="0s" repeatCount="indefinite"
          keyTimes="0;0.13889;0.18333;0.22222;1"
          values="0;230;230;0;0"/>
      </rect>
    </clipPath>
    <clipPath id="clip1">
      <rect x="0" y="50" width="0" height="55">
        <animate attributeName="width" dur="18s" begin="0s" repeatCount="indefinite"
          keyTimes="0;0.25;0.38889;0.43333;0.47222;1"
          values="0;0;540;540;0;0"/>
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="0" y="50" width="0" height="55">
        <animate attributeName="width" dur="18s" begin="0s" repeatCount="indefinite"
          keyTimes="0;0.5;0.63889;0.68333;0.72222;1"
          values="0;0;600;600;0;0"/>
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="0" y="50" width="0" height="55">
        <animate attributeName="width" dur="18s" begin="0s" repeatCount="indefinite"
          keyTimes="0;0.75;0.88889;0.93333;0.97222;1"
          values="0;0;500;500;0;0"/>
      </rect>
    </clipPath>
  </defs>

  <!-- ambient twinkle particles (eased pulse, not linear) -->
  <use href="#star" xlink:href="#star" transform="translate(40,25) scale(0.6)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.0s" begin="0s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" transform="translate(610,30) scale(0.5)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.3s" begin="0.4s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" transform="translate(25,115) scale(0.55)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="1.9s" begin="0.8s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" transform="translate(625,110) scale(0.6)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" transform="translate(320,18) scale(0.5)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.1s" begin="0.3s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" transform="translate(180,124) scale(0.55)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" transform="translate(480,20) scale(0.6)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" transform="translate(560,120) scale(0.5)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.0s" begin="1.8s" repeatCount="indefinite"/>
  </use>

  <!-- rising sparks (ease-out drift up + eased fade) -->
  <use href="#star" xlink:href="#star" opacity="0">
    <animateTransform attributeName="transform" type="translate" values="100,95;100,30" calcMode="spline" keySplines="0.16,1,0.3,1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" opacity="0">
    <animateTransform attributeName="transform" type="translate" values="250,95;250,30" calcMode="spline" keySplines="0.16,1,0.3,1" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" opacity="0">
    <animateTransform attributeName="transform" type="translate" values="400,95;400,30" calcMode="spline" keySplines="0.16,1,0.3,1" dur="2.2s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.2s" begin="1.6s" repeatCount="indefinite"/>
  </use>
  <use href="#star" xlink:href="#star" opacity="0">
    <animateTransform attributeName="transform" type="translate" values="550,95;550,30" calcMode="spline" keySplines="0.16,1,0.3,1" dur="2.2s" begin="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42,0,0.58,1;0.42,0,0.58,1" dur="2.2s" begin="2.4s" repeatCount="indefinite"/>
  </use>

  <!-- typing text lines, revealed/erased via animated clip-path (typewriter effect) -->
  <text x="0" y="85" font-family="Fira Code, monospace" font-weight="600" font-size="26" fill="#EDE9FE" clip-path="url(#clip0)" textLength="230" lengthAdjust="spacing">Hi, I'm Pavan 👋</text>
  <text x="0" y="85" font-family="Fira Code, monospace" font-weight="600" font-size="26" fill="#EDE9FE" clip-path="url(#clip1)" textLength="540" lengthAdjust="spacing">Full-Stack Developer &amp; UI/UX Designer</text>
  <text x="0" y="85" font-family="Fira Code, monospace" font-weight="600" font-size="26" fill="#EDE9FE" clip-path="url(#clip2)" textLength="600" lengthAdjust="spacing">Turning ideas into fast, scalable products</text>
  <text x="0" y="85" font-family="Fira Code, monospace" font-weight="600" font-size="26" fill="#EDE9FE" clip-path="url(#clip3)" textLength="500" lengthAdjust="spacing">Always learning, always building 🚀</text>

  <!-- magic wand tip: sits right at the text now (was floating too high before),
       still tracks the same reveal/erase edge as the active line, with a lively spring bob -->
  <text x="0" y="60" font-size="34" filter="url(#glow)">
    <animate attributeName="x" dur="18s" begin="0s" repeatCount="indefinite"
      keyTimes="0;0.13889;0.18333;0.22222;0.25;0.38889;0.43333;0.47222;0.5;0.63889;0.68333;0.72222;0.75;0.88889;0.93333;0.97222;1"
      values="0;230;230;0;0;540;540;0;0;600;600;0;0;500;500;0;0"/>
    <animate attributeName="y" values="60;64;60" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.34,1.56,0.64,1;0.34,1.56,0.64,1" dur="0.7s" repeatCount="indefinite"/>🪄</text>
</svg>
